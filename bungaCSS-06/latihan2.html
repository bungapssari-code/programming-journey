<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Profil</title>

    <style>
        .card {
            width: 300px;
            border: 2px solid gray;
            border-radius: 15px;
            padding: 20px;
            margin: 50px auto;
            text-align: center;
            font-family: Arial, sans-serif;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .foto {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Foto Profil" class="foto">

        <h2>Bunga Puspita Sari</h2>

        <p>Siswi PPLG SMK N 1 Kandeman</p>
    </div>

</body>
</html>
