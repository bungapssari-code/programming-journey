<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Border</title>

    <style>
        .kotak {
            width: 200px;
            height: 100px;
            margin: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .solid {
            border: 4px solid black;
        }

        .double {
            border: 6px double blue;
        }

        .groove {
            border: 6px groove green;
        }

        .ridge {
            border: 6px ridge red;
        }
    </style>
</head>
<body>

    <div class="kotak solid">Border Solid Hitam</div>

    <div class="kotak double">Border Double Biru</div>

    <div class="kotak groove">Border Groove Hijau</div>

    <div class="kotak ridge">Border Ridge Merah</div>

</body>
</html>
