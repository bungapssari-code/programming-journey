<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Sederhana</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .header {
            width: 100%;
            height: 100px;
            background-color: skyblue;
            text-align: center;
            line-height: 100px;
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            width: 100%;
            height: 300px;
            background-color: lightgray;
            text-align: center;
            line-height: 300px;
            font-size: 20px;
        }

        .footer {
            width: 100%;
            height: 80px;
            background-color: gray;
            color: white;
            text-align: center;
            line-height: 80px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">HEADER</div>

    <div class="content">CONTENT</div>

    <div class="footer">FOOTER</div>

</body>
</html>
