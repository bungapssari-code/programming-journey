<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Ukuran Box</title>

    <style>
        .box {
            margin: 20px;
            text-align: center;
            line-height: 150px;
            color: white;
            font-weight: bold;
        }

        /* Box 1 */
        .box1 {
            width: 200px;
            height: 200px;
            background-color: blue;
            line-height: 200px;
        }

        /* Box 2 */
        .box2 {
            width: 50%;
            height: 150px;
            background-color: green;
        }

        /* Box 3 */
        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: red;
            line-height: 30vh;
        }
    </style>
</head>
<body>

    <div class="box box1">Box 1 (200px × 200px)</div>

    <div class="box box2">Box 2 (50% × 150px)</div>

    <div class="box box3">Box 3 (80vw × 30vh)</div>

</body>
</html>
