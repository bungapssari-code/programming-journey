<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Warna CSS</title>
    <link rel="stylesheet" href="color.css">
</head>
<body>

    <h1>Contoh Penggunaan Warna pada CSS</h1>

    <p class="warna-nama">
        Warna menggunakan nama warna (blue).
    </p>

    <p class="warna-rgb">
        Warna menggunakan RGB.
    </p>

    <p class="warna-rgba">
        Warna menggunakan RGBA.
    </p>

    <p class="warna-hsl">
        Warna menggunakan HSL.
    </p>

    <p class="warna-hsla">
        Warna menggunakan HSLA.
    </p>

</body>
</html>
