<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Background Image</title>

    <style>
        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            background-color: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 15px 25px;
            border-radius: 10px;
        }

        p {
            background-color: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Tugas Background Image</h1>
    <br><br>
    <p>Contoh halaman HTML dengan gambar sebagai latar belakang.</p>

</body>
</html>
