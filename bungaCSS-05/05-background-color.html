<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgroun Color</title>
    <style>
        .bcolor {
            background-color: yellow;
            padding: 20px;
            margin: 10px;
        }
         .bcolor-rgb {
            background-color: rgb(0, 128, 0);
            padding: 20px;
            margin: 10px;
        }
         .bcolor-rgba {
            background-color: rgba(225, 0, 0, 0.5);
            padding: 20px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="bcolor">Warna latar belakang</div>
    <div class="bcolor-rgb">Warna latar belakang RGB</div>
    <div class="bcolor-rgba">Warna latar belakang RGBA</div>
</body>
</html>
