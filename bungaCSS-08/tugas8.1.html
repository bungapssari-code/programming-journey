<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 8.1</title>
    <style>
        /* Judul menggunakan px */
        h1 {
            font-size: 36px;
            text-align: center;
        }

        /* Paragraf menggunakan pt */
        p {
            font-size: 14pt;
            text-align: justify;
        }

        /* Box menggunakan cm */
        .box-cm {
            width: 6cm;
            height: 3cm;
            background-color: lightblue;
            border: 2px solid blue;
            margin: 20px 0;
            text-align: center;
            line-height: 3cm;
        }

        /* Box menggunakan % */
        .box-percent {
            width: 50%;
            height: 100px;
            background-color: lightgreen;
            border: 2px solid green;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>

    <h1>Contoh Satuan CSS</h1>

    <p>
        Paragraf ini menggunakan satuan point (pt) untuk ukuran teks.
        Satuan pt sering digunakan pada dokumen cetak karena mengikuti
        ukuran tipografi.
    </p>

    <div class="box-cm">
        Box 6cm x 3cm
    </div>

    <div class="box-percent">
        Box Lebar 50%
    </div>

</body>
</html>
