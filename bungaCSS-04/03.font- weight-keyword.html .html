<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Weight with keyword</title>
    <style>
        .w-lighter {
            font-weight: lighter;
        }
        .w-normal {
            font-weight: normal;
        }
        .w-bold {
            font-weight: bold;
        }
        .w-bolder{
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <p class="w-lighter">Ini adalah font w-lighter</p>
    <p class="w-normal">Ini adalah font w-normal</p>
    <p class="w-bold">Ini adalah font w-bold</p>
    <p class="w-bolder">Ini adalah font w-bolder</p>
</body>
</html>
