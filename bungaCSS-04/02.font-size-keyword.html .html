<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font style</title>
    <style>
        .size-normal {
            font-size: normal;
        }
        .size-small {
            font-size: small;
        }
        .size-large {
            font-size: large;
        }
        .size-x-large { 
            font-size: x-large;
        }
        .size-xx-large {
            font-size: xx-large;
        }
        .size-x-small {
            font-size: x-small;
        }
        .size-xx-small{
            font-size: xx-small;
        }
    </style>
</head>
<body>
    <p class="size-normal">Ini adalah size normal</p>
    <p class="size-small">Ini adalah size small</p>
    <p class="size-large">Ini adalah size large</p>
    <p class="size-x-large">Ini adalah size x-large</p>
    <p class="size-xx-large">Ini adalah size xx-large</p>
    <p class="size-x-small">Ini adalah size x-small</p>
    <p class="size-xx-small">Ini adalah size xx-small</p>
</body>
</html>
