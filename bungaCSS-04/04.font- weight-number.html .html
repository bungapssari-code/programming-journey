<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Wegiht with number</title>
    <style>
        .wn-100 {
            font-weight: 100;
        }
         .wn-400 {
            font-weight: 400;
        }
         .wn-700 {
            font-weight: 700;
        }
         .wn-900 {
            font-weight: 900;
        }
    </style>
</head>
<body>
    <p class="wn-100">Ini adalah font w-lighter</p>
    <p class="wn-400">Ini adalah font w-normal</p>
    <p class="wn-700">Ini adalah font w-bold</p>
    <p class="wn-900">Ini adalah font w-bolder</p>
</body>
</html>
